name: Deploy Site
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check local directory
        run: ls -la ./local/ || echo "Directory ./local/ not found"

      # Выберите ОДИН из вариантов ниже:

      # ВАРИАНТ 1: Исправление текущего действия
      - name: Upload Files (fixed)
        uses: pontago/lftp-deploy-action@v1.0.1
        with:
          protocol: ftp
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local_dir: ./local/
          remote_dir: /
          verify_cert: true
          create_remote_dir: true
          dry_run: false
          debug: false
          timeout: 30
          max_retries: 5
          script: |
            set ssl:verify-certificate false
            mirror -R --verbose ./local/ /
        env:
          LFTP_DEBUG: 3

