name: Deploy Site
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check local directory
        run: |
          if [ -d "./local/" ]; then
            echo "Local directory ./local/ exists"
            ls -la ./local/
          else
            echo "ERROR: Local directory ./local/ not found!"
            exit 1
          fi

      - name: Debug: Check secrets (do not show password)
        run: |
          echo "SFTP_HOST: ${{ secrets.SFTP_HOST }}"
          echo "SFTP_USERNAME: ${{ secrets.SFTP_USERNAME }}"
        shell: bash

      - name: Deploy via lftp (direct)
        run: |
          lftp -c "
            set ssl:verify-certificate false
            open -u ${{ secrets.SFTP_USERNAME }}, ${{ secrets.SFTP_PASSWORD }} ${{ secrets.SFTP_HOST }}
            mirror -R --verbose ./local/ /
            quit
          "
        shell: bash
