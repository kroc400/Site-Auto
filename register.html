<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header></header>

    <main class="content">

    <div class="registation-block">
        <div class="registation-title">Регистрация</div>
        <div class="registation-inputs">
            <input type="text" id="username" placeholder="Логин">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            
            <div class="captcha-container">
                <div class="captcha-question" id="captchaQuestion">Загрузка...</div>
                <input type="text" id="captchaAnswer" class="captcha-input" placeholder="Введите ответ">
                <input type="hidden" id="captchaToken" value="">
            </div>

            <button id="registerBtn" class="regButton">Зарегистрироваться</button>
            <div id="message"></div>
            <p class="loginRedirect">Уже есть аккаунт? <a href="login.html">Войти</a></p>
        </div>
        
    </div>

    

    </main>

    <script type="module" src="header.js"></script>
    <script type="module" src="footer.js"></script>

    <script>
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('message');

            if (!username || !email || !password) {
                msg.textContent = 'Заполните все поля';
                return;
            }

            const response = await fetch('/api/register.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const result = await response.json();

            if (result.success) {
                msg.style.color = 'green';
                msg.textContent = 'Регистрация успешна! Перенаправление на вход...';
                setTimeout(() => window.location.href = 'login.html', 1500);
            } else {
                msg.style.color = 'red';
                msg.textContent = result.message;
            }
        });
    </script>

    <footer></footer>

    <script>
        let captchaResult = 0;
        
        function generateCaptcha() {
            const num1 = Math.floor(Math.random() * 10) + 1;
            const num2 = Math.floor(Math.random() * 10) + 1;
            const operators = ['+', '-'];
            const operator = operators[Math.floor(Math.random() * operators.length)];
            
            let question = '';
            let result = 0;
            
            if (operator === '+') {
                question = `${num1} + ${num2}`;
                result = num1 + num2;
            } else {
                if (num1 >= num2) {
                    question = `${num1} - ${num2}`;
                    result = num1 - num2;
                } else {
                    question = `${num2} - ${num1}`;
                    result = num2 - num1;
                }
            }
            
            document.getElementById('captchaQuestion').textContent = `Сколько будет ${question}?`;
            captchaResult = result;
        }
        
        function checkCaptcha() {
            const userAnswer = parseInt(document.getElementById('captchaAnswer').value.trim());
            return !isNaN(userAnswer) && userAnswer === captchaResult;
        }
        
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msgDiv = document.getElementById('message');
            const registerBtn = document.getElementById('registerBtn');
            
            // Сброс сообщения
            msgDiv.textContent = '';
            msgDiv.className = '';
            
            // Валидация полей
            if (!username || !email || !password) {
                msgDiv.textContent = 'Заполните все поля';
                msgDiv.className = 'error-message';
                return;
            }
            
            // Проверка капчи
            if (!checkCaptcha()) {
                msgDiv.textContent = '❌ Неправильный ответ капчи. Попробуйте ещё раз.';
                msgDiv.className = 'error-message';
                generateCaptcha();
                document.getElementById('captchaAnswer').value = '';
                return;
            }
            
            // Блокируем кнопку, чтобы не было повторных отправок
            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';
            
            try {
                const response = await fetch('/api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    msgDiv.textContent = '✅ Регистрация успешна! Перенаправление на вход...';
                    msgDiv.className = 'success-message';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    msgDiv.textContent = result.message || 'Ошибка регистрации';
                    msgDiv.className = 'error-message';
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Зарегистрироваться';
                    generateCaptcha();
                    document.getElementById('captchaAnswer').value = '';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                msgDiv.textContent = 'Ошибка соединения с сервером';
                msgDiv.className = 'error-message';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            }
        });
        
        generateCaptcha();
    </script>

</body>
</html>
