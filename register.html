<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header></header>

    <main class="content">
        <div class="registation-block">
            <div class="registation-title">Регистрация</div>
            <div class="registation-inputs">
                <input type="text" id="username" placeholder="Логин">
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="password" placeholder="Пароль">
                
                <div class="captcha-container">
                    <div class="captcha-question" id="captchaQuestion">Загрузка...</div>
                    <input type="text" id="captchaAnswer" class="captcha-input" placeholder="Введите ответ">
                    <button type="button" id="refreshCaptcha" class="regButton">Обновить капчу</button>
                </div>

                <button id="registerBtn" class="regButton">Зарегистрироваться</button>
                <div id="message"></div>
                <p class="loginRedirect">Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </main>

    <script type="module" src="header.js"></script>
    <script type="module" src="footer.js"></script>

    

    <footer></footer>

    <script>
        // Функция загрузки капчи с сервера
        async function loadCaptcha() {
            try {
                const response = await fetch('/api/captcha.php');
                const data = await response.json();
                document.getElementById('captchaQuestion').textContent = data.question;
            } catch (error) {
                console.error('Ошибка загрузки капчи:', error);
                document.getElementById('captchaQuestion').textContent = 'Ошибка загрузки. Обновите страницу.';
            }
        }
        
        // ЕДИНСТВЕННЫЙ ОБРАБОТЧИК КНОПКИ РЕГИСТРАЦИИ
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const captchaAnswer = document.getElementById('captchaAnswer').value.trim();
            const msgDiv = document.getElementById('message');
            const registerBtn = document.getElementById('registerBtn');
            
            msgDiv.textContent = '';
            msgDiv.className = '';
            
            if (!username || !email || !password) {
                msgDiv.textContent = 'Заполните все поля';
                msgDiv.className = 'error-message';
                return;
            }
            
            if (!captchaAnswer) {
                msgDiv.textContent = 'Введите ответ на капчу';
                msgDiv.className = 'error-message';
                return;
            }
            
            registerBtn.disabled = true;
            registerBtn.textContent = 'Регистрация...';
            
            try {
                const response = await fetch('/api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username, 
                        email, 
                        password,
                        captcha: parseInt(captchaAnswer)
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    msgDiv.textContent = 'Регистрация успешна! Перенаправление на вход...';
                    msgDiv.className = 'success-message';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    msgDiv.textContent = result.message || 'Ошибка регистрации';
                    msgDiv.className = 'error-message';
                    registerBtn.disabled = false;
                    registerBtn.textContent = 'Зарегистрироваться';
                    // Обновляем капчу при ошибке
                    loadCaptcha();
                    document.getElementById('captchaAnswer').value = '';
                }
            } catch (error) {
                console.error('Ошибка:', error);
                msgDiv.textContent = 'Ошибка соединения с сервером';
                msgDiv.className = 'error-message';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Зарегистрироваться';
            }
        });
        
        // Обновление капчи по кнопке
        document.getElementById('refreshCaptcha').addEventListener('click', () => {
            loadCaptcha();
            document.getElementById('captchaAnswer').value = '';
        });
        
        // Загружаем капчу при загрузке страницы
        loadCaptcha();
    </script>

</body>
</html>
