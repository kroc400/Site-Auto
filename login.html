<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header></header>
    <main class="content">
        <div class="login-block">
            <div class="login-title">Вход в аккаунт</div>
            <div class="login-inputs">
                <input type="text"  id="login" placeholder="Логин или Email">
                <input type="password" id="password" placeholder="Пароль">
                <button class="loginButton" id="loginBtn">Войти</button>
                <div id="message"></div>
                <p class="loginRedirect">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
            </div>
        </div>

        <!-- <div class="container">
            <h2>Вход в аккаунт</h2>
            <input type="text" id="login" placeholder="Логин или Email">
            <input type="password" id="password" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <div id="message"></div>
            <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
        </div> -->

    </main>

    <footer></footer>

    <script type="module" src="header.js"></script>
    <script type="module" src="footer.js"></script>

    <script>
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('message');

            if (!login || !password) {
                msg.textContent = 'Заполните оба поля';
                return;
            }

            const response = await fetch('/api/login.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, password })
            });
            const result = await response.json();

            if (result.success) {
                msg.style.color = 'green';
                msg.textContent = 'Вход выполнен! Перенаправление...';
                localStorage.setItem('username', result.user.username);
                setTimeout(() => window.location.href = 'account.html', 1000);
            } else {
                msg.style.color = 'red';
                msg.textContent = result.message;
            }
        });
    </script>
</body>
</html>
