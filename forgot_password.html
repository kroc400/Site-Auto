<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .reset-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            background: #f5f5f5;
            border-radius: 25px;
            text-align: center;
        }
        .reset-container h2 {
            margin-bottom: 20px;
            color: #e63946;
        }
        .reset-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .reset-container button {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .reset-container button:hover {
            background: #e63946;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .reset-link-area {
            margin-top: 20px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            display: none;
        }
        .reset-link-area a {
            color: #e63946;
            word-break: break-all;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <header></header>
    <main class="content">
        <div class="reset-container">
            <h2>🔐 Восстановление пароля</h2>
            <p>Введите ваш email, и мы покажем ссылку для сброса пароля</p>
            
            <input type="email" id="resetEmail" placeholder="Ваш email" required>
            <button id="sendResetLinkBtn">Получить ссылку для восстановления</button>
            
            <div id="message" class="message"></div>
            
            <div id="resetLinkArea" class="reset-link-area">
                <p>✨ Перейдите по ссылке для сброса пароля:</p>
                <a href="#" id="resetLink" target="_blank">Ссылка для восстановления</a>
                <p style="font-size: 12px; margin-top: 10px;">⚠️ Ссылка действительна 1 час</p>
            </div>
            
            <a href="login.html" class="back-link">← Вернуться ко входу</a>
        </div>
    </main>
    <footer></footer>

    <script src="header.js" type="module"></script>
    <script src="footer.js" type="module"></script>
    
    <script>
        document.getElementById('sendResetLinkBtn').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value.trim();
            const messageDiv = document.getElementById('message');
            const resetLinkArea = document.getElementById('resetLinkArea');
            const resetLink = document.getElementById('resetLink');
            
            messageDiv.className = 'message';
            messageDiv.style.display = 'block';
            resetLinkArea.style.display = 'none';
            
            if (!email) {
                messageDiv.textContent = 'Введите email';
                messageDiv.classList.add('error');
                return;
            }
            
            try {
                const response = await fetch('/api/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('success');
                    
                    // Показываем ссылку для восстановления
                    resetLink.href = result.reset_url;
                    resetLink.textContent = result.reset_url;
                    resetLinkArea.style.display = 'block';
                } else {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                messageDiv.textContent = 'Ошибка соединения с сервером';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>
</html>
