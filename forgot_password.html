<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header></header>
    <main class="content">
        <div class="reset-container">
            <h2>Восстановление пароля</h2>
            <p>Введите ваш email</p>
            
            <input type="email" id="resetEmail" placeholder="Ваш email" required>
            <button id="sendResetLinkBtn">Получить ссылку для восстановления</button>
            
            <div id="message" class="message"></div>
            
            <div id="resetLinkArea" class="reset-link-area">
                <p>Перейдите по ссылке для сброса пароля:</p>
                <a href="#" id="resetLink" target="_blank">Ссылка для восстановления</a>
                <p style="font-size: 12px; margin-top: 10px;">Ссылка действительна 7 минут</p>
            </div>
            
            <a href="login.html" class="back-link">← Вернуться ко входу</a>
        </div>
    </main>
    <footer></footer>

    <script src="header.js" type="module"></script>
    <script src="footer.js" type="module"></script>
    
    <script>
        document.getElementById('sendResetLinkBtn').addEventListener('click', async () => {
            const email = document.getElementById('resetEmail').value.trim();
            const messageDiv = document.getElementById('message');
            const resetLinkArea = document.getElementById('resetLinkArea');
            const resetLink = document.getElementById('resetLink');
            
            messageDiv.className = 'message';
            messageDiv.style.display = 'block';
            resetLinkArea.style.display = 'none';
            
            if (!email) {
                messageDiv.textContent = 'Введите email';
                messageDiv.classList.add('error');
                return;
            }
            
            try {
                const response = await fetch('/api/forgot_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('success');
                    
                    // Показываем ссылку для восстановления
                    resetLink.href = result.reset_url;
                    resetLink.textContent = result.reset_url;
                    resetLinkArea.style.display = 'block';
                } else {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                messageDiv.textContent = 'Ошибка соединения с сервером';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>
</html>
