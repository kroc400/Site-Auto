<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тачки на прокачку</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header class="header">
        <div class="header-actions">
            <button
                class="header-burger-button"
                type="button">
                <svg width="28" height="22" viewBox="0 0 28 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                <line x1="2" y1="2" x2="26" y2="2" stroke="#262626" stroke-width="4" stroke-linecap="round"/>
                <line x1="2" y1="11" x2="26" y2="11" stroke="#262626" stroke-width="4" stroke-linecap="round"/>
                <line x1="2" y1="20" x2="26" y2="20" stroke="#262626" stroke-width="4" stroke-linecap="round"/>
                </svg>
            </button>
        </div>
        <a class="header-logo" href="/">
            <img
                class="header-logo"
                src="./images/logo.png"
                alt="Logo"
                width="198", height="50" loading="lazy"/>
        </a>
        <nav class="header-menu">
            <ul class="header-menu-list">
                <li class="header-menu-item">
                    <a class="header-menu-link" href="/">Швидкули вор ... О компании</a>
                </li>
                <li class="header-menu-item">
                    <a class="header-menu-link" href="/">Техцентр</a>
                </li>
                <li class="header-menu-item">
                    <a class="header-menu-link" href="/">Отзывы</a>
                </li>
                <li class="header-menu-item">
                    <a class="header-menu-link" href="/">Контакты</a>
                </li>
            </ul>
        </nav>
        <div class="mobile-contacts">
        <div class="mobile-contact-item">
            <img src="/icons/mobile-logo.svg" alt="Phone" class="mobile-icon">
            <span class="mobile-text-main">+7(800)555-35-35</span>
        </div>
        <div class="mobile-contact-item">
            <span class="mobile-text-second">+7(495)228-12-34</span>
        </div>
        </div>
    </header>
    <main class="content">
        <h1 class="visually-hidden">AutoStock</h1>
        <section class="banner">
            <img src="./images/banner-car1.png" class="banner-img img-1" alt="banner-car-1">
            <img src="./images/banner-car2.png" class="banner-img img-2" alt="banner-car-2">
            <img src="./images/banner-car3.png" class="banner-img img-3" alt="banner-car-3">
            <h2 class="visually-hidden">Promotion</h2>
            <div class="bubble">
                <div class="bubble-item">
                    <span class="bubble-text">Осталось всего 10 авто!</span>
                </div>
            </div>
            <div class="banner-body">
                <div class="banner-info">Грандиозная распродажа тестового парка!</div>
                <h3></h3>
            </div>
            <div class="banner-pagination">
                <ul class="banner-pagination-list">
                    <li class="banner-pagination-item">
                        <button class="banner-pagination-button"
                        type="button"></button>
                    </li>
                    <li class="banner-pagination-item">
                        <button class="banner-pagination-button"
                        type="button"></button>
                    </li>
                    <li class="banner-pagination-item is-current">
                        <button class="banner-pagination-button"
                        type="button"></button>
                    </li>
                </ul>
            </div>
        </section>
    </main>
</body>
</html>
