    <header></header>

    <main class="content">
        <h1 class="visually-hidden">User Profile</h1>
        
        <!-- Проверка авторизации -->
        <div id="authCheck"></div>
        
        <div id="profileContent" style="display: none;">
            <div class="user_Profile">
                <h2 class="user_title">Данные пользователя</h2>
                <div class="user_data">
                    <div class="FIO">
                        <div>Фамилия</div>
                        <input type="text" id="surname" placeholder="Иванов">
                        <div>Имя</div>
                        <input type="text" id="name" placeholder="Иван">
                        <div>Отчество</div>
                        <input type="text" id="patronymic" placeholder="Иванович">
                    </div>
                    <div class="user_contacts">
                        <div>Номер телефона</div>
                        <input type="text" id="phone" placeholder="+7(800)555-35-35">
                        <div>Email</div>
                        <input type="text" id="email" placeholder="example@example.com" readonly style="background: #f0f0f0;">
                        <div>
                            <div class="profile_save_text">Save</div>
                            <button class="profile_save_button" id="saveProfileBtn">Сохранить</button>
                        </div>
                    </div>
                    <button class="logoutBtn" id="logoutBtn" >Выйти из аккаунта</button>
                </div>
                </div>
            </div>

            <!-- Блок избранного -->
            <div class="favorites-section">
                <div class="account-favorite-title">Избранные автомобили</h2>
                <div id="favoritesGrid" class="favorites-grid">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <script type="module" src="header.js"></script>
    <script type="module" src="footer.js"></script>
    <script src="backToTopButton.js"></script>
    <script src="https://unpkg.com/imask"></script>
    <script src="masks.js"></script>

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    <script>

        // #region[ rgba(255, 0, 0, 0.4) ] devmode
        // ========== РЕЖИМ РАЗРАБОТКИ (вставить ПЕРЕД основным кодом) ==========
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isDev = urlParams.has('dev') || localStorage.getItem('devMode') === 'true';
            if (!isDev) return; // обычный режим — ничего не меняем

            console.log('🛠️ РЕЖИМ РАЗРАБОТКИ: данные-заглушки, API не вызываются');

            // Сохраняем оригинальные функции, если они уже объявлены
            const originalCheckAuth = window.checkAuth;
            const originalLoadUserProfile = window.loadUserProfile;
            const originalLoadFavorites = window.loadFavorites;

            // Переопределяем checkAuth
            window.checkAuth = async function() {
                const authDiv = document.getElementById('authCheck');
                if (authDiv) authDiv.innerHTML = `<div style="background: #d4edda; padding: 10px;">🛠️ DEV-режим: данные заглушки</div>`;
                document.getElementById('profileContent').style.display = 'block';
                if (window.loadMockProfile) window.loadMockProfile();
                if (window.loadMockFavorites) window.loadMockFavorites();
            };

            // Заглушка профиля
            window.loadMockProfile = function() {
                const fields = ['surname', 'name', 'patronymic', 'phone', 'email'];
                const values = ['Иванов', 'Иван', 'Иванович', '+7(800)555-35-35', 'dev@example.com'];
                fields.forEach((id, idx) => {
                    const el = document.getElementById(id);
                    if (el) el.value = values[idx];
                });
            };

            // Заглушка избранного
            window.loadMockFavorites = function() {
                const container = document.getElementById('favoritesGrid');
                if (!container) return;
                container.innerHTML = `
                    <div class="favorite-card">
                        <h4>Toyota Camry (тест)</h4>
                        <div class="price">3 700 000 ₽</div>
                        <button onclick="alert('DEV: удаление заглушки')">Удалить</button>
                    </div>
                    <div class="favorite-card">
                        <h4>Honda Civic (тест)</h4>
                        <div class="price">3 400 000 ₽</div>
                        <button onclick="alert('DEV: удаление заглушки')">Удалить</button>
                    </div>
                `;
            };

            // Перехватываем fetch, чтобы реальные запросы не ходили
            const originalFetch = window.fetch;
            window.fetch = function(...args) {
                const url = args[0];
                if (typeof url === 'string' && (
                    url.includes('/api/check_session.php') ||
                    url.includes('/api/user_profile.php') ||
                    url.includes('/api/get_favorites.php') ||
                    url.includes('/api/favorites_toggle.php') ||
                    url.includes('/api/logout.php')
                )) {
                    console.log('DEV: перехвачен запрос к API', url);
                    // Возвращаем пустой ответ, чтобы не ломать код
                    return Promise.resolve(new Response(JSON.stringify({}), {
                        status: 200,
                        headers: { 'Content-Type': 'application/json' }
                    }));
                }
                return originalFetch.apply(this, args);
            };

            // Отключаем обработчик сохранения профиля (чтобы не слал запросы)

                const saveBtn = document.getElementById('saveProfileBtn');
                if (saveBtn) {
                    const newBtn = saveBtn.cloneNode(true);
                    saveBtn.parentNode.replaceChild(newBtn, saveBtn);
                    newBtn.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('DEV-режим: сохранение профиля отключено');
                    });
                }
                const logoutBtn = document.getElementById('logoutBtn');
                if (logoutBtn) {
                    const newLogout = logoutBtn.cloneNode(true);
                    logoutBtn.parentNode.replaceChild(newLogout, logoutBtn);
                    newLogout.addEventListener('click', (e) => {
                        e.preventDefault();
                        alert('DEV-режим: выход не выполняется');

        // Проверка авторизации
        async function checkAuth() {
            const response = await fetch('/api/check_session.php');
            const data = await response.json();
            
            if (data.logged_in) {
                document.getElementById('authCheck').innerHTML = `<div style="background: #d4edda; padding: 10px; text-align: center;">Вы вошли как: ${data.username}</div>`;
                document.getElementById('profileContent').style.display = 'block';
                loadUserProfile();
                loadFavorites();
            } else {
                document.getElementById('authCheck').innerHTML = `<div class="auth-warning">Вы не авторизованы. <a href="login.html">Войдите</a> в аккаунт</div>`;
                document.getElementById('profileContent').style.display = 'none';
            }
        }

        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            const response = await fetch('/api/logout.php');
            const result = await response.json();
            
            if (result.success) {
                alert('Вы вышли из аккаунта');
                window.location.href = 'index.html';
            } else {
                alert('Ошибка при выходе');
            }
        });

        // Загрузка профиля
        async function loadUserProfile() {
            const response = await fetch('/api/user_profile.php');
            const user = await response.json();
            
            document.getElementById('surname').value = user.surname || '';
            document.getElementById('name').value = user.name || '';
            document.getElementById('patronymic').value = user.patronymic || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('email').value = user.email || '';
        }

        // Сохранение профиля
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const data = {
                surname: document.getElementById('surname').value,
                name: document.getElementById('name').value,
                patronymic: document.getElementById('patronymic').value,
                phone: document.getElementById('phone').value
            };
            
            const response = await fetch('/api/user_profile.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.success) {
                alert('Профиль сохранён!');
            } else {
                alert('Ошибка: ' + result.message);
            }
        });

        // Загрузка избранного
        async function loadFavorites() {
            const container = document.getElementById('favoritesGrid');
            try {
                const response = await fetch('/api/get_favorites.php');
                const favorites = await response.json();
                
                if (favorites.error) {
                    container.innerHTML = `<p>${favorites.error}</p>`;
                    return;
                }
                
                if (!favorites.length) {
                    container.innerHTML = '<p>У вас пока нет избранных автомобилей. Добавьте их на <a href="index.html">главной странице</a>.</p>';
                    return;
                }
                
                container.innerHTML = favorites.map(car => `
                    <div class="favorite-card" data-car-id="${car.id}">
                        <h4>${car.title}</h4>
                        <div class="price">${car.price}</div>
                        <a href="car_template.html?id=${car.id}" style="display: inline-block; margin: 10px 0; color: #0066cc;">Подробнее</a>
                        <button onclick="removeFromFavorites(${car.id})">Удалить из избранного</button>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<p>Ошибка загрузки избранного</p>';
            }
        }

        // Удаление из избранного
        window.removeFromFavorites = async function(carId) {
            const response = await fetch('/api/favorites_toggle.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ car_id: carId })
            });
            const result = await response.json();
            
            if (result.success) {
                loadFavorites(); // обновляем список
                alert(result.message);
            } else {
                alert('Ошибка: ' + result.message);
            }
        };

        // Запуск проверки авторизации
        checkAuth();
    </script>
