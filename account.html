<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        /* Дополнительные стили для избранного */
        .favorites-section {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .favorite-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            background: #f9f9f9;
        }
        .favorite-card h4 {
            margin: 0 0 10px;
            font-size: 18px;
        }
        .favorite-card .price {
            color: #e63946;
            font-weight: bold;
            margin: 10px 0;
        }
        .favorite-card button {
            background: #e63946;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .favorite-card button:hover {
            background: #c1121f;
        }
        .auth-warning {
            color: red;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header></header>

    <main class="content">
        <h1 class="visually-hidden">User Profile</h1>
        
        <!-- Проверка авторизации -->
        <div id="authCheck"></div>
        
        <div id="profileContent" style="display: none;">
            <div class="user_Profile">
                <h2 class="user_title">Данные пользователя</h2>
                <div class="user_data">
                    <div class="FIO">
                        <div>Фамилия</div>
                        <input type="text" id="surname" placeholder="Иванов">
                        <div>Имя</div>
                        <input type="text" id="name" placeholder="Иван">
                        <div>Отчество</div>
                        <input type="text" id="patronymic" placeholder="Иванович">
                    </div>
                    <div class="user_contacts">
                        <div>Номер телефона</div>
                        <input type="text" id="phone" placeholder="+7(800)555-35-35">
                        <div>Email</div>
                        <input type="text" id="email" placeholder="example@example.com" readonly style="background: #f0f0f0;">
                        <div>
                            <div class="profile_save_text">Save</div>
                            <button class="profile_save_button" id="saveProfileBtn">Сохранить</button>
                        </div>
                    </div>
                    <div style="text-align: right; margin-bottom: 20px;">
                    <button id="logoutBtn" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">
                        🚪 Выйти из аккаунта
                    </button>
    </div>
                </div>
            </div>

            <!-- Блок избранного -->
            <div class="favorites-section">
                <h2>Избранные автомобили</h2>
                <div id="favoritesGrid" class="favorites-grid">
                    <p>Загрузка...</p>
                </div>
            </div>
        </div>
    </main>

    <footer></footer>

    <script type="module" src="header.js"></script>
    <script type="module" src="footer.js"></script>
    <script src="backToTopButton.js"></script>
    <script src="https://unpkg.com/imask"></script>
    <script src="masks.js"></script>
    
    <script>
        // Проверка авторизации
        async function checkAuth() {
            const response = await fetch('/api/check_session.php');
            const data = await response.json();
            
            if (data.logged_in) {
                document.getElementById('authCheck').innerHTML = `<div style="background: #d4edda; padding: 10px; text-align: center;">Вы вошли как: ${data.username}</div>`;
                document.getElementById('profileContent').style.display = 'block';
                loadUserProfile();
                loadFavorites();
            } else {
                document.getElementById('authCheck').innerHTML = `<div class="auth-warning">Вы не авторизованы. <a href="login.html">Войдите</a> в аккаунт</div>`;
                document.getElementById('profileContent').style.display = 'none';
            }
        }

        document.getElementById('logoutBtn')?.addEventListener('click', async () => {
            const response = await fetch('/api/logout.php');
            const result = await response.json();
            
            if (result.success) {
                alert('Вы вышли из аккаунта');
                window.location.href = 'index.html';
            } else {
                alert('Ошибка при выходе');
            }
        });

        // Загрузка профиля
        async function loadUserProfile() {
            const response = await fetch('/api/user_profile.php');
            const user = await response.json();
            
            document.getElementById('surname').value = user.surname || '';
            document.getElementById('name').value = user.name || '';
            document.getElementById('patronymic').value = user.patronymic || '';
            document.getElementById('phone').value = user.phone || '';
            document.getElementById('email').value = user.email || '';
        }

        // Сохранение профиля
        document.getElementById('saveProfileBtn')?.addEventListener('click', async () => {
            const data = {
                surname: document.getElementById('surname').value,
                name: document.getElementById('name').value,
                patronymic: document.getElementById('patronymic').value,
                phone: document.getElementById('phone').value
            };
            
            const response = await fetch('/api/user_profile.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await response.json();
            
            if (result.success) {
                alert('Профиль сохранён!');
            } else {
                alert('Ошибка: ' + result.message);
            }
        });

        // Загрузка избранного
        async function loadFavorites() {
            const container = document.getElementById('favoritesGrid');
            try {
                const response = await fetch('/api/get_favorites.php');
                const favorites = await response.json();
                
                if (favorites.error) {
                    container.innerHTML = `<p>${favorites.error}</p>`;
                    return;
                }
                
                if (!favorites.length) {
                    container.innerHTML = '<p>У вас пока нет избранных автомобилей. Добавьте их на <a href="index.html">главной странице</a>.</p>';
                    return;
                }
                
                container.innerHTML = favorites.map(car => `
                    <div class="favorite-card" data-car-id="${car.id}">
                        <h4>${car.title}</h4>
                        <div class="price">${car.price}</div>
                        <a href="car_template.html?id=${car.id}" style="display: inline-block; margin: 10px 0; color: #0066cc;">Подробнее</a>
                        <button onclick="removeFromFavorites(${car.id})">Удалить из избранного</button>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<p>Ошибка загрузки избранного</p>';
            }
        }

        // Удаление из избранного
        window.removeFromFavorites = async function(carId) {
            const response = await fetch('/api/favorites_toggle.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ car_id: carId })
            });
            const result = await response.json();
            
            if (result.success) {
                loadFavorites(); // обновляем список
                alert(result.message);
            } else {
                alert('Ошибка: ' + result.message);
            }
        };

        // Запуск проверки авторизации
        checkAuth();
    </script>
</body>
</html>
