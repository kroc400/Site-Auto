<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <script src="debug.js"></script>
    <header></header>
    
    <main class="content">
        <h1 class="visually-hidden">Toyota Camry</h1>

        <section class="banner">
            <img src="./images/placeholder.png" class="Toyota_Camry-banner-img">
            <div class="Toyota_Camry_banner-body">
                <span class="car-title-banner"></span>
                <div id="car-price" class="price"></div>

                <!-- <div class="price">от 3 700 000 ₽</div> -->

                <div class="car-gift-container">
                    <div class="car-gift">
                        <div class="car-gift-icon">
                            <img src="./icons/gift_icon.png">
                        </div>
                        <div class="car-gift-text">Улучшим любое предложение</div>
                    </div>
                    <div class="car-0procent">
                        <div class="car-0procent-icon">
                            <img src="./icons/0procent_icon.png">
                        </div>
                        <div class="car-gift-text">Без первончального взноса</div>
                    </div>
                    <div class="car-RUB">
                        <div class="car-RUB-icon">
                            <img src="./icons/ruble_icon.png">
                        </div>
                        <div id="car-procent" class="car-gift-text"></div>
                    </div>
                    <div class="actions-container">
                        <div>
                            <div class="favorite-button-container">
                                <button id="favoriteBtn" class="favorite-btn">❤️</button>
                            <div id="favoriteMessage" class="favorite-message"></div>
                            </div>
                        </div>
                        <div class="booking-section">
                            <button id="bookingBtn" class="booking-btn">📞 Забронировать</button>
                        </div>
                    </div>

                    <div class="color-picker-wrapper">
                        <div class="color-picker-label">Цвет:</div>
                        <div class="color-buttons-list" id="colorButtonsList"></div>
                    </div>
                    
                    <!-- Модальное окно для ввода имени и телефона -->
                    <div id="bookingModal" class="modal" style="display: none;">
                        <div class="modal-content">
                            <span class="modal-close">&times;</span>
                            <h3>Бронирование автомобиля</h3>
                            <div id="bookingCarInfo"></div>
                            <input type="text" id="bookingName" placeholder="Ваше имя" value="">
                            <input type="tel" id="bookingPhone" placeholder="+7 (XXX) XXX-XX-XX">
                            <div class="consent-checkbox">
                                <input type="checkbox" id="bookingConsent" required>
                                <label for="bookingConsent">
                                    Я ознакомлен и согласен с 
                                    <a href="/privacy-policy.html" target="_blank">Политикой конфиденциальности</a> и 
                                    <a href="/terms-of-use.html" target="_blank">Пользовательским соглашением</a>, 
                                    а также даю согласие на получение обратного звонка для подтверждения бронирования
                                </label>
                            </div>
                            <button id="submitBookingBtn">Отправить заявку</button>
                            <div id="bookingMessage"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="copml">
            <div>
                <h2 class="visually-hidden">Комплектация</h2>
                <div class="equipment">Что входит в комплектацию Active</div>
                <div class="equipment-grid"></div>
            </div>
        </section>

        <section class="section_car_specifications">
            <div class="car_dimensions_specifications">
                <div class="car_dimensions_specifications_title">
                    <span id="car-title">Технические характеристики</span>
                    <!-- Технические характеристики Toyota Camry 2.0 AT Стандарт 2020 -->
                </div>

                <div class="car_dimensions_specifications_grid">

                    <!-- НОРМАЛЬНАЯ ВЁРСТКА -->
                    <div class="car_dimensions_specifications_column car-side-view">
                        <img src="./images/car_template/side_car.png" alt="Боковой вид Toyota Camry">
                        <img src="./images/car_template/side_line.png">
                        <div class="dimension_text dimension-length" id="dimension-length">—</div>
                    </div>

                    <div class="car_dimensions_specifications_column car-back-view">
                        <img src="./images/car_template/back_car.png" alt="Вид сзади Toyota Camry">
                        <img src="./images/car_template/back_front_line.png">
                        <div class="dimension_text dimension-width" id="dimension-width-back">—</div>
                    </div>

                    <div class="car_dimensions_specifications_column car-front-view">
                        <img src="./images/car_template/front_car.png" alt="Вид спереди Toyota Camry">
                        <img src="./images/car_template/back_front_line.png">
                    <div class="dimension_text dimension-width" id="dimension-width-front">—</div>

                    <div class="car_dimensions_specifications_column car-height-view">
                        <img src="./images/car_template/height_line.png" class="height-indicator" alt="Высота кузова Toyota Camry">
                        <div class="dimension_text dimension-height" id="dimension-height">—</div>
                    </div>
                </div>

      
                <div class="specs-column">
                    <div class="specs-list">
                            <!-- НОРМАЛЬНАЯ ВЁРСТКА -->
                        <div class="specs-table">
                        <div class="specs-table-row">
                            <div class="specs-label">Длина кузова, мм</div>
                            <div class="specs-value">—</div>
                        </div>
                        <div class="specs-table-row">
                            <div class="specs-label">Ширина кузова, мм</div>
                            <div class="specs-value">—</div>
                        </div>
                        <div class="specs-table-row">
                            <div class="specs-label">Высота кузова, мм</div>
                            <div class="specs-value">—</div>
                        </div>
                        <div class="specs-table-row">
                            <div class="specs-label">Колёсная база, мм</div>
                            <div class="specs-value">—</div>
                        </div>
                        <div class="specs-table-row">
                            <div class="specs-label">Дорожный просвет, мм</div>
                            <div class="specs-value">—</div>
                        </div>
                        </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>


    </main>
    <footer></footer>

    <script src="car-details.js"></script>
    <script type="module" async src='header.js'></script>
    <script type="module" async src='footer.js'></script>
    <script  src="backToTopButton.js"></script>
</body>
</html>
