<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <header></header>
    <main class="content">
        <div class="reset-container">
            <h2>Сброс пароля</h2>
            <p>Введите новый пароль для вашей учётной записи</p>
            
            <input type="password" id="newPassword" placeholder="Новый пароль" required>
            <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" required>
            <button id="resetPasswordBtn">Сохранить новый пароль</button>
            
            <div id="message" class="message"></div>
            <a href="login.html" class="back-link">← Вернуться ко входу</a>
        </div>
    </main>
    <footer></footer>

    <script src="header.js" type="module"></script>
    <script src="footer.js" type="module"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('message').textContent = 'Недействительная ссылка для восстановления';
            document.getElementById('message').className = 'message error';
            document.getElementById('resetPasswordBtn').disabled = true;
        }
        
        document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const messageDiv = document.getElementById('message');
            
            messageDiv.className = 'message';
            
            if (!newPassword || !confirmPassword) {
                messageDiv.textContent = 'Заполните все поля';
                messageDiv.classList.add('error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                messageDiv.textContent = 'Пароли не совпадают';
                messageDiv.classList.add('error');
                return;
            }
            
            try {
                const response = await fetch('/api/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        new_password: newPassword 
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                messageDiv.textContent = 'Ошибка соединения с сервером';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>
</html>
