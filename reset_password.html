<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сброс пароля</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        .reset-container {
            max-width: 500px;
            margin: 80px auto;
            padding: 30px;
            background: #f5f5f5;
            border-radius: 25px;
            text-align: center;
        }
        .reset-container h2 {
            margin-bottom: 20px;
            color: #e63946;
        }
        .reset-container input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .reset-container button {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }
        .reset-container button:hover {
            background: #e63946;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <header></header>
    <main class="content">
        <div class="reset-container">
            <h2>🔐 Сброс пароля</h2>
            <p>Введите новый пароль для вашей учётной записи</p>
            
            <input type="password" id="newPassword" placeholder="Новый пароль" required>
            <input type="password" id="confirmPassword" placeholder="Подтвердите пароль" required>
            <button id="resetPasswordBtn">Сохранить новый пароль</button>
            
            <div id="message" class="message"></div>
            <a href="login.html" class="back-link">← Вернуться ко входу</a>
        </div>
    </main>
    <footer></footer>

    <script src="header.js" type="module"></script>
    <script src="footer.js" type="module"></script>
    
    <script>
        // Получаем токен из URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            document.getElementById('message').textContent = 'Недействительная ссылка для восстановления';
            document.getElementById('message').className = 'message error';
            document.getElementById('resetPasswordBtn').disabled = true;
        }
        
        document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const messageDiv = document.getElementById('message');
            
            messageDiv.className = 'message';
            
            if (!newPassword || !confirmPassword) {
                messageDiv.textContent = 'Заполните все поля';
                messageDiv.classList.add('error');
                return;
            }
            
            if (newPassword.length < 4) {
                messageDiv.textContent = 'Пароль должен содержать минимум 4 символа';
                messageDiv.classList.add('error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                messageDiv.textContent = 'Пароли не совпадают';
                messageDiv.classList.add('error');
                return;
            }
            
            try {
                const response = await fetch('/api/reset_password.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        token: token, 
                        new_password: newPassword 
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('success');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageDiv.textContent = result.message;
                    messageDiv.classList.add('error');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                messageDiv.textContent = 'Ошибка соединения с сервером';
                messageDiv.classList.add('error');
            }
        });
    </script>
</body>
</html>
